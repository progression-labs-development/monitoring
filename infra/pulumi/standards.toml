[metadata]
tier = "production"

[extends]
registry = "github:progression-labs-development/standards"
rulesets = ["typescript-production"]

[code.linting.eslint]
enabled = true
files = ["src/**/*.ts"]
ignore = ["node_modules/**/*", "src/__mocks__/**/*"]

[code.types.tsc]
enabled = true

[code.unused.knip]
enabled = true

[code.security.secrets]
enabled = true

[code.security.pnpmaudit]
enabled = true

[code.naming]
enabled = false

[process.ci]
enabled = false

[process.repo]
enabled = false
